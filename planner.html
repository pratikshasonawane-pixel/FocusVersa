<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Study Planner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page-wrapper">

  <div class="page-header">

    <h1 class="page-title">🤖 AI Study Planner</h1>

    <a href="index.html">
      <button class="back-btn">🏠 Home</button>
    </a>

  </div>

  <!-- INPUT -->
  <div class="glass-card">

    <h2>Generate Smart Study Plan</h2>

    <input id="subjectInput" placeholder="Subjects (Java, Maths, DBMS)"
      style="width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;">

    <input id="hoursInput" placeholder="Study hours per day"
      style="width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;">

    <input id="examDate" type="date"
      style="width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;">

    <button class="back-btn" onclick="generatePlan()">
      Generate AI Plan ✨
    </button>

  </div>

  <!-- AI THINKING -->
  <div id="aiThinking" class="glass-card" style="display:none;margin-top:20px;">
    🤖 AI is analyzing your schedule...
    <div class="loader"></div>
  </div>

  <!-- OUTPUT -->
  <div id="planOutput" class="card-grid" style="margin-top:20px;"></div>

</div>

<script src="planner.js"></script>

</body>
</html>
